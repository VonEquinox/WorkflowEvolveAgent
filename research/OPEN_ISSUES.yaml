  - id: MCP-001
    ws: cross-cutting
    title: MCP-over-Bash bridge（独立并行子项目）
    priority: P1
    status: design_resolved
    owner: mcp-bridge
    decision: >-
      2026-07-13（PI_INTEGRATION_PLAN.md §9，D15–D18）：TypeScript CLI（wea-mcp search/describe/call），
      progressive disclosure + 结果就地处理/--out 落盘；独立于图调度主线并行推进。
      先例：Anthropic engineering/code-execution-with-mcp（150k→2k token）。
    acceptance: >-
      B0 连通真实 MCP server；B1 实测直连 vs bridge 的上下文 token 对比（定义预加载与结果穿透两项均下降）；
      B2 bridge 调用入 Trace IR 并接 exact cache；写类 MCP 工具不参与复用（同 D10）。
