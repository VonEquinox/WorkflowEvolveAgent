issues:
  - id: SCOPE-001
    ws: cross-cutting
    title: 收窄已过时的 novelty claim
    priority: P0
    status: design_resolved
    owner: main
    decision: >-
      不再主张 coding workflow 自进化或图 IR 本身无人做；主张收窄为 repository-state-aware
      content-addressed reuse + consumer-aware trace + LOO-calibrated trace attribution + typed
      retrieve-and-constrained-edit IR + champion gate 的统一系统。
    evidence: research/worklogs/evidence-ledger.md
    acceptance: 相关工作覆盖 EvoMAC/SEW/DGM/Socratic-SWE/MermaidFlow/MaAS/FlowReasoner，且主张可被逐项消融验证。

  - id: MODEL-001
    ws: WS1/WS6
    title: 分离 Trace IR、Workflow IR 与派生图视图
    priority: P0
    status: design_resolved
    owner: main+agent-E
    decision: Trace IR 是不可变执行事实；Workflow IR 是 canonical executable template；图分析视图与检索索引均派生。
    acceptance: schema 中不存在多个可独立修改的真相源；trace 可回指 template/version/instance。

  - id: METRIC-001
    ws: WS0
    title: 定义节点价值的 estimand
    priority: P0
    status: research_in_progress
    owner: agent-A
    acceptance: 明确区分 causal marginal contribution、observational proxy、operational pruning label。

  - id: ATTR-001
    ws: WS0/WS5
    title: single-trace attribution proxy
    priority: P0
    status: prototype_ready
    owner: agent-A+prototype-worker
    acceptance: 至少两种算法；输入/公式/复杂度/失败模式；在 LOO 子集上定义 precision/AUROC/calibration。
    phase2_note: >-
      2026-07-14：PVF 已在真实 runner trace 上跑通并驱动 Phase 2 复盘（analysis/postmortem.py，D25）。
      实测关键教训：绝对 low_credit（阈值0）在成功 run 上从不触发，可执行的浪费信号是**相对**的
      （credit/token 分位 + 同 role 近等 credit 冗余）。LOO 校准仍未做，阈值参数待校准（对齐 M2）。

  - id: ATTR-002
    ws: WS5
    title: 跨运行结构性冗余统计
    priority: P1
    status: research_in_progress
    owner: agent-A
    acceptance: 分层 Bayesian/置信区间方案；不会因单次未消费永久删除探索/保险节点。

  - id: BENCH-001
    ws: WS0
    title: 标准化 coding-agent graph trace benchmark
    priority: P0
    status: design_resolved
    owner: main
    decision: 基于 SWE-bench harness 与公开 trajs 自采 50–200 条统一 Trace IR；公开数据不是完全为空，而是缺统一 graph/cost/consumer/counterfactual labels。
    acceptance: 固定模型/预算/工具；每节点成本、repo state、依赖、输出、最终 patch/test；小子集有 removal labels。

  - id: TRACE-001
    ws: WS1
    title: Agent Trace IR schema
    priority: P0
    status: prototype_ready
    owner: agent-B+schema-worker
    acceptance: 与 OTel invoke_agent/invoke_workflow/execute_tool 兼容，扩展 repo/effect/consumer/dependency fields，并提供 JSON Schema。

  - id: TRACE-002
    ws: WS1
    title: 节点粒度与 span/event 边界
    priority: P1
    status: research_in_progress
    owner: agent-B
    acceptance: 任务、LLM call、tool call、artifact/read/write 的分层规范；同一粒度可稳定计算成本与依赖。

  - id: TRACE-003
    ws: WS1
    title: instrumentation adapter 策略
    priority: P1
    status: prototype_ready
    owner: main+agent-H
    decision: >-
      2026-07-13 修订（PI_INTEGRATION_PLAN.md D6）：首个 runtime 采用 pi（earendil-works/pi-mono，
      SDK 进程内 AgentSession + 扩展事件采集），OpenHands/SWE-agent/LangGraph 降级为后续 adapter 候选。
      2026-07-14：Phase 0 spike 实测通过（spikes/phase0/FINDINGS.md）——per-node prompt/并行隔离/
      usage 采集/JSON 契约/tool 事件 read-set 全部验证；appendEntry 不作 trace 通道（D20）；
      digest 由 runner 自算（D22）。
    acceptance: 先支持一个可控 runtime；列出后续 adapter 的 hook 可行性及缺失字段，不承诺跨框架完全等价。

  - id: REUSE-001
    ws: WS2
    title: exact cache key 与依赖闭包
    priority: P0
    status: research_in_progress
    owner: agent-B
    acceptance: key 包含 task spec、template/operator/model/tool versions、permissions、declared+observed input digests、repo snapshot、output contract。

  - id: REUSE-002
    ws: WS2
    title: exact/semantic/adapt 三档安全策略
    priority: P0
    status: research_in_progress
    owner: agent-B
    acceptance: exact 可默认；semantic 需 applicability predicate+verifier；adapt 作为新执行节点计费并验证。

  - id: REUSE-003
    ws: WS2
    title: 缓存失效传播
    priority: P0
    status: research_in_progress
    owner: agent-B
    acceptance: dependency digest 变化可定位失效；volatile/external input 禁止跨运行复用；支持 negative cache 与 TTL 边界。

  - id: REUSE-004
    ws: WS2
    title: side-effect 与权限隔离
    priority: P0
    status: design_resolved
    owner: main
    decision: effect class 为 PURE_READ/SANDBOX_WRITE/COMMIT_WRITE/EXTERNAL_SIDE_EFFECT；只有可重放类自动 retry/reuse。
    acceptance: 写操作使用隔离 worktree/幂等键；模板 adaptation 不扩大权限。

  - id: CACHE-001
    ws: WS2
    title: 区分 KV/prefix cache 与 workflow result cache
    priority: P1
    status: design_resolved
    owner: main
    decision: 分层实现、分层指标；SGLang/Parrot 仅作为下层运行时优化，不证明结果语义可复用。
    acceptance: 两类 cache hit/cost saving 分开报告。

  - id: SCHED-001
    ws: WS3
    title: online/incremental DAG scheduler
    priority: P1
    status: prototype_ready
    owner: agent-C+scheduler-worker
    acceptance: 支持节点动态发现、ready frontier、资源约束、取消、失败传播和部分结果。

  - id: SCHED-002
    ws: WS3
    title: API/GPU/token 多资源限流
    priority: P1
    status: research_in_progress
    owner: agent-C
    acceptance: 同时满足 provider rate limit、并发、token/费用预算；调度目标明确 critical path 与 throughput trade-off。

  - id: SCHED-003
    ws: WS3
    title: speculative execution 判据
    priority: P2
    status: research_in_progress
    owner: agent-C
    acceptance: 以触发概率、预期节省、资源机会成本与取消成本给出正期望阈值；浪费预算有硬上限。

  - id: SCHED-004
    ws: WS3
    title: 并发写冲突与 worktree isolation
    priority: P0
    status: design_resolved
    owner: main
    decision: 已知重叠 write set 串行；未知 write set 分离 worktree，fan-in 时三方 merge+test。
    acceptance: 不允许并发节点直接写同一工作树造成非确定结果。

  - id: AGG-001
    ws: WS4
    title: fan-in 聚合算子选择
    priority: P1
    status: research_in_progress
    owner: agent-D
    acceptance: 区分 evidence union、ranking/vote、judge、structured code merge；按 verifier strength 和 independence 选择。

  - id: LOOP-001
    ws: WS4
    title: feedback loop 终止与收敛
    priority: P1
    status: research_in_progress
    owner: agent-D
    acceptance: 硬预算+进展指标+重复状态检测+无改善 patience+不可恢复上报；无无限循环。

