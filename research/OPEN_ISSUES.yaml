  - id: SEC-001
    ws: cross-cutting
    title: secrets、隐私与 cache tenancy
    priority: P0
    status: design_resolved
    owner: main
    decision: secret/PII 不写 trace 正文或 shared cache；digest 也按 tenant/workspace 隔离；输出带 sensitivity label。
    acceptance: schema 和 runtime 有 redaction、tenant namespace、retention policy。
    phase1_note: >-
      2026-07-14 Phase 0 实测（FINDINGS §3.2）：只读工具白名单不隔离路径——planner 在 [ls,read,grep,find]
      白名单下仍 read 了 .env（含 API key）。→ Phase 1 必做：recorder 落 trace 前对 read-set 路径与内容做
      redaction（.env/*.key/.git/credentials 等）；敏感文件隔离靠 worktree 副本 + 路径 allowlist（D23）。

  - id: EVAL-001
    ws: WS0/WS8
    title: 多目标评测与公平消融
    priority: P0
    status: design_resolved
    owner: main
    decision: 固定模型/预算/权限，做 tree、trace、reuse、scheduler、retrieval、edit、prune、full-loop 消融；同时报告 pass/cost/latency/risk。
    acceptance: paired seeds/tasks、置信区间、失败分类、总资源成本；不只报平均准确率。

  - id: KILL-001
    ws: cross-cutting
    title: 每阶段 kill criteria
    priority: P0
    status: design_resolved
    owner: main
    acceptance: exact duplicate share、cache precision、attribution precision、retrieval uplift、promotion regression 均有停止/转向阈值。

